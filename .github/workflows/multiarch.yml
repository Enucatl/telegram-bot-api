name: Docker build and push

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 3 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  build:
    name: Build Docker image
    runs-on: ubuntu-latest
    env:
      IMAGE_TAG: ghcr.io/enucatl/telegram-bot-api

    steps:
      - name: Checkout current repo
        uses: actions/checkout@v5

      - name: Checkout upstream repo
        uses: actions/checkout@v5
        with:
          repository: tdlib/telegram-bot-api
          path: telegram-bot-api
          submodules: recursive

      - name: Get version
        id: version
        run: |
          VERSION=$(cat telegram-bot-api/CMakeLists.txt | grep TelegramBotApi | cut -d " " -f3)
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Scan filesystem with Trivy
        id: fs_table
        continue-on-error: true
        uses: aquasecurity/trivy-action@128d9a8815401077119ad09f6ca1892d422c387b
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: "1"
          scanners: misconfig,secret
          severity: HIGH,CRITICAL
          skip-dirs: ./telegram-bot-api/td

      - name: Write filesystem SARIF
        uses: aquasecurity/trivy-action@128d9a8815401077119ad09f6ca1892d422c387b
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-fs.sarif
          exit-code: "0"
          scanners: misconfig,secret
          severity: HIGH,CRITICAL
          skip-dirs: ./telegram-bot-api/td

      - name: Upload filesystem Trivy SARIF
        if: always() && hashFiles('trivy-fs.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

      - name: Enforce filesystem scan policy
        if: ${{ steps.fs_table.outcome == 'failure' }}
        run: exit 1

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v7
        env:
          DOCKER_BUILD_SUMMARY: false
          DOCKER_BUILD_RECORD_UPLOAD: false
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_TAG }}:${{ env.VERSION }}
            ${{ env.IMAGE_TAG }}:latest
          platforms: linux/amd64
          build-args: |
            nproc=2

      - name: Scan published image with Trivy
        id: image_table
        continue-on-error: true
        uses: aquasecurity/trivy-action@128d9a8815401077119ad09f6ca1892d422c387b
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: ${{ env.IMAGE_TAG }}:${{ steps.version.outputs.version }}
          format: table
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: os,library
          scanners: vuln,secret
          severity: HIGH,CRITICAL

      - name: Write image SARIF
        uses: aquasecurity/trivy-action@128d9a8815401077119ad09f6ca1892d422c387b
        env:
          TRIVY_USERNAME: ${{ github.actor }}
          TRIVY_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
        with:
          image-ref: ${{ env.IMAGE_TAG }}:${{ steps.version.outputs.version }}
          format: sarif
          output: trivy-image.sarif
          exit-code: "0"
          ignore-unfixed: true
          vuln-type: os,library
          scanners: vuln,secret
          severity: HIGH,CRITICAL

      - name: Upload image Trivy SARIF
        if: always() && hashFiles('trivy-image.sarif') != ''
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-image.sarif
          category: trivy-image

      - name: Enforce image scan policy
        if: ${{ steps.image_table.outcome == 'failure' }}
        run: exit 1
